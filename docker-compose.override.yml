version: "3.9"

services:
  openchamber:
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-openchamba-traefik}"
      - "traefik.http.routers.${TRAEFIK_INSTANCE_NAME:-tenant-app}.rule=Host(`${OPENCHAMBER_DOMAIN:-tenant-app.example.com}`) || Host(`www.${OPENCHAMBER_DOMAIN:-tenant-app.example.com}`)"
      - "traefik.http.routers.${TRAEFIK_INSTANCE_NAME:-tenant-app}.entrypoints=websecure"
      - "traefik.http.routers.${TRAEFIK_INSTANCE_NAME:-tenant-app}.tls=true"
      - "traefik.http.routers.${TRAEFIK_INSTANCE_NAME:-tenant-app}.service=${TRAEFIK_INSTANCE_NAME:-tenant-app}"
      - "traefik.http.services.${TRAEFIK_INSTANCE_NAME:-tenant-app}.loadbalancer.server.port=${OPENCHAMBER_PORT:-3000}"
    networks:
      - default
      - traefik

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-openchamba-traefik}
