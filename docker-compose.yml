services:
  opencode:
    build:
      context: .
      dockerfile: Dockerfile.opencode
    user: "opencode"
    ports:
      - "${OPENCODE_BIND_ADDRESS:-127.0.0.1}:${OPENCODE_SERVER_PORT:-4096}:${OPENCODE_SERVER_PORT:-4096}"
      - "${OPENCODE_BIND_ADDRESS:-127.0.0.1}:${OPENCODE_AUX_SERVER_PORT:-1455}:1455"
    expose:
      - "${OPENCODE_SERVER_PORT:-4096}"
      - "1455"
    environment:
      OPENCODE_SERVER_PORT: ${OPENCODE_SERVER_PORT:-4096}
      OPENCODE_HOST: ${OPENCODE_HOST:-0.0.0.0}
      OPENCODE_DISABLE_AUTOUPDATE: ${OPENCODE_DISABLE_AUTOUPDATE:-true}
    volumes:
      - ./data/opencode/config:/home/opencode/.config/opencode
      - ./data/opencode/share:/home/opencode/.local/share/opencode
      - ./data/opencode/state:/home/opencode/.local/state/opencode
      - ./data/opencode/cache:/home/opencode/.cache/opencode
      - ./data/ssh:/home/opencode/.ssh
      - ${HOST_PROJECTS_DIR:-./projects}:/workspace:delegated
    restart: unless-stopped

  restart-bridge:
    build:
      context: .
      dockerfile: Dockerfile.restart-bridge
    environment:
      PORT: ${RESTART_BRIDGE_PORT:-8080}
      TARGET_SERVICE: opencode
      TARGET_HOST: opencode
      TARGET_PORT: ${OPENCODE_SERVER_PORT:-4096}
      TARGET_COMPOSE_PROJECT: ${TARGET_COMPOSE_PROJECT:-}
      RESTART_BRIDGE_TOKEN: ${OPENCODE_CONTROL_TOKEN:?OPENCODE_CONTROL_TOKEN must be set}
      DOCKER_REQUEST_TIMEOUT_MS: ${DOCKER_REQUEST_TIMEOUT_MS:-5000}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "${RESTART_BRIDGE_PORT:-8080}"
    restart: unless-stopped

  openchamber:
    build:
      context: .
      dockerfile: Dockerfile.openchamber
    user: "openchamber"
    ports:
      - "${OPENCHAMBER_BIND_ADDRESS:-127.0.0.1}:${OPENCHAMBER_PORT:-3000}:${OPENCHAMBER_PORT:-3000}"
    environment:
      OPENCHAMBER_PORT: ${OPENCHAMBER_PORT:-3000}
      OPENCHAMBER_HOST: ${OPENCHAMBER_HOST:-0.0.0.0}
      OPENCHAMBER_DATA_DIR: ${OPENCHAMBER_DATA_DIR:-/home/openchamber/.config/openchamber}
      OPENCHAMBER_UI_PASSWORD: ${OPENCHAMBER_UI_PASSWORD:-}
      OPENCODE_SKIP_START: ${OPENCODE_SKIP_START:-true}
      OPENCODE_BINARY: /bin/true
      OPENCODE_HOST: http://opencode:${OPENCODE_SERVER_PORT:-4096}
      OPENCHAMBER_EXTERNAL_RESTART_URL: http://restart-bridge:${RESTART_BRIDGE_PORT:-8080}/restart/opencode
      OPENCHAMBER_EXTERNAL_RESTART_TOKEN: ${OPENCODE_CONTROL_TOKEN:?OPENCODE_CONTROL_TOKEN must be set}
      OPENCHAMBER_EXTERNAL_RESTART_TIMEOUT_MS: ${OPENCHAMBER_EXTERNAL_RESTART_TIMEOUT_MS:-15000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/openchamber/config:${OPENCHAMBER_DATA_DIR:-/home/openchamber/.config/openchamber}
      - ./data/openchamber/share:/home/openchamber/.local/share/openchamber
      - ./data/openchamber/state:/home/openchamber/.local/state/openchamber
      - ./data/openchamber/cache:/home/openchamber/.cache/openchamber
      - ./data/opencode/config:/home/openchamber/.config/opencode
      - ./data/opencode/share:/home/openchamber/.local/share/opencode
      - ./data/ssh:/home/openchamber/.ssh
      - ${HOST_PROJECTS_DIR:-./projects}:/workspace:delegated
    restart: unless-stopped
